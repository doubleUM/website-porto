<div class="tf-prism-bg" aria-hidden="true">
    <div class="tf-plasma tf-plasma--1"></div>
    <div class="tf-plasma tf-plasma--2"></div>
    <div class="tf-shard tf-shard--1"></div>
    <div class="tf-shard tf-shard--2"></div>
</div>

<header class="tf-top">
    <div class="tf-top-inner">
        <div class="tf-brand" style="display: flex; align-items: center; gap: 12px;">
            <a href="{{ url_for('portfolio_home') }}" class="tf-exit" title="Portfolio">←</a>
            <span class="tf-wordmark" style="margin-right: 0;">TextForge</span>
        </div>
        <nav class="tf-nav" aria-label="TextForge sections">
            <a href="{{ url_for('ai_tool_page') }}" class="tf-nav-link {% if request.endpoint == 'ai_tool_page' %}is-on{% endif %}">Intro</a>
            <a href="{{ url_for('ai_tool_studio') }}" class="tf-nav-link {% if request.endpoint == 'ai_tool_studio' %}is-on{% endif %}">Studio</a>
            <a href="{{ url_for('ai_tool_presets') }}" class="tf-nav-link {% if request.endpoint == 'ai_tool_presets' %}is-on{% endif %}">Presets</a>
            <a href="{{ url_for('ai_tool_docs') }}" class="tf-nav-link {% if request.endpoint == 'ai_tool_docs' %}is-on{% endif %}">API</a>
            <button type="button" class="tf-theme-toggle" id="theme-toggle" title="Toggle Theme">
                <span class="theme-icon-dark">🌙</span>
                <span class="theme-icon-light">☀️</span>
            </button>
        </nav>
    </div>
</header>

<script>
    (function () {
        const theme = localStorage.getItem('hub-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    })();

    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        const html = document.documentElement;
        themeToggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('hub-theme', next);
        });
    }
</script>
