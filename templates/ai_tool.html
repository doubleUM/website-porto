<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TextForge — AI-powered text processing tool">
    <title>TextForge — AI Text Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ai_tool.css') }}">
</head>
<body>
    <header class="ai-header">
        <div class="ai-container">
            <nav class="ai-nav">
                <a href="{{ url_for('portfolio_home') }}" class="ai-back" title="Back to Portfolio">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                </a>
                <div class="ai-brand">
                    <span class="ai-brand-icon">🤖</span>
                    <span class="ai-brand-text">TextForge</span>
                </div>
                <div class="ai-badge">AI-POWERED</div>
            </nav>
        </div>
    </header>

    <main class="ai-main">
        <div class="ai-container">
            <div class="ai-hero">
                <h1 class="ai-title">Transform your text with AI</h1>
                <p class="ai-subtitle">Summarize, translate, change tone, or explain — all in one powerful tool.</p>
            </div>

            <!-- Mode selector -->
            <div class="ai-modes">
                <button class="ai-mode is-active" data-mode="summarize">
                    <span class="ai-mode-icon">📝</span>
                    <span class="ai-mode-label">Summarize</span>
                </button>
                <button class="ai-mode" data-mode="translate">
                    <span class="ai-mode-icon">🌍</span>
                    <span class="ai-mode-label">Translate</span>
                </button>
                <button class="ai-mode" data-mode="tone">
                    <span class="ai-mode-icon">🎭</span>
                    <span class="ai-mode-label">Change Tone</span>
                </button>
                <button class="ai-mode" data-mode="explain">
                    <span class="ai-mode-icon">💡</span>
                    <span class="ai-mode-label">Explain</span>
                </button>
            </div>

            <!-- Options row -->
            <div class="ai-options" id="options-row">
                <div class="ai-option-group" id="opt-translate" style="display:none">
                    <label>Target language</label>
                    <select id="target-lang">
                        <option value="Indonesian">Indonesian</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="German">German</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Korean">Korean</option>
                        <option value="Chinese">Chinese</option>
                    </select>
                </div>
                <div class="ai-option-group" id="opt-tone" style="display:none">
                    <label>Tone</label>
                    <select id="target-tone">
                        <option value="professional">Professional</option>
                        <option value="casual">Casual</option>
                        <option value="friendly">Friendly</option>
                        <option value="formal">Formal</option>
                        <option value="humorous">Humorous</option>
                    </select>
                </div>
            </div>

            <!-- Text Stats Bar -->
            <div class="ai-text-stats" id="text-stats">
                <div class="ai-ts"><span id="ts-words">0</span> words</div>
                <div class="ai-ts"><span id="ts-chars">0</span> chars</div>
                <div class="ai-ts"><span id="ts-sentences">0</span> sentences</div>
                <div class="ai-ts">~<span id="ts-reading">0</span> min read</div>
            </div>

            <!-- Workspace -->
            <div class="ai-workspace">
                <div class="ai-panel ai-panel-input">
                    <div class="ai-panel-header">
                        <span>Input</span>
                        <button class="ai-clear-btn" id="clear-btn" title="Clear input">✕ Clear</button>
                    </div>
                    <textarea id="input-text" placeholder="Paste or type your text here..."></textarea>
                </div>

                <div class="ai-panel-divider">
                    <button class="ai-process-btn" id="process-btn" title="Process text">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                </div>

                <div class="ai-panel ai-panel-output">
                    <div class="ai-panel-header">
                        <span>Output</span>
                        <div class="ai-output-actions">
                            <button class="ai-action-btn" id="copy-btn" title="Copy" style="display:none">📋 Copy</button>
                            <button class="ai-action-btn" id="download-btn" title="Download" style="display:none">💾 Download</button>
                        </div>
                    </div>
                    <div class="ai-output" id="output-text">
                        <div class="ai-placeholder">
                            <span class="ai-placeholder-icon">✨</span>
                            <p>Your processed text will appear here</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Examples -->
            <div class="ai-examples">
                <p class="ai-examples-label">Try an example:</p>
                <div class="ai-example-chips">
                    <button class="ai-chip" data-text="Artificial intelligence (AI) is intelligence demonstrated by machines, as opposed to natural intelligence displayed by animals including humans. AI research has been defined as the field of study of intelligent agents, which refers to any system that perceives its environment and takes actions that maximize its chance of achieving its goals. The term artificial intelligence had previously been used to describe machines that mimic and display human cognitive skills.">AI Definition</button>
                    <button class="ai-chip" data-text="Climate change refers to long-term shifts in temperatures and weather patterns. Human activities have been the main driver of climate change, primarily due to the burning of fossil fuels like coal, oil, and gas, which produces heat-trapping gases. These emissions have caused global temperatures to rise by about 1.1 degrees Celsius since the pre-industrial era.">Climate Change</button>
                    <button class="ai-chip" data-text="Python is a high-level, general-purpose programming language. Its design philosophy emphasizes code readability with the use of significant indentation. Python is dynamically typed and garbage-collected. It supports multiple programming paradigms, including structured, object-oriented, and functional programming.">Python Language</button>
                </div>
            </div>

            <!-- Processing History -->
            <div class="ai-history-section">
                <div class="ai-history-header">
                    <h3>📚 Processing History</h3>
                    <button class="ai-action-btn" id="clear-history-btn">Clear All</button>
                </div>
                <div class="ai-history" id="history-list">
                    <div class="ai-history-empty">No processing history yet</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const modes = document.querySelectorAll('.ai-mode');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const processBtn = document.getElementById('process-btn');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');
        const clearBtn = document.getElementById('clear-btn');
        const historyList = document.getElementById('history-list');
        const optTranslate = document.getElementById('opt-translate');
        const optTone = document.getElementById('opt-tone');

        let currentMode = 'summarize';
        let processingHistory = JSON.parse(localStorage.getItem('tf-history') || '[]');

        // =====================================================================
        // MODE SELECTOR
        // =====================================================================
        modes.forEach(btn => {
            btn.addEventListener('click', () => {
                modes.forEach(b => b.classList.remove('is-active'));
                btn.classList.add('is-active');
                currentMode = btn.dataset.mode;
                optTranslate.style.display = currentMode === 'translate' ? 'flex' : 'none';
                optTone.style.display = currentMode === 'tone' ? 'flex' : 'none';
            });
        });

        // =====================================================================
        // TEXT STATS
        // =====================================================================
        function updateStats() {
            const text = inputText.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            const sentences = text.trim() ? (text.match(/[.!?]+/g) || []).length || (text.trim().length > 0 ? 1 : 0) : 0;
            const readMins = Math.max(1, Math.ceil(words / 200));

            document.getElementById('ts-words').textContent = words;
            document.getElementById('ts-chars').textContent = chars;
            document.getElementById('ts-sentences').textContent = sentences;
            document.getElementById('ts-reading').textContent = words > 0 ? readMins : 0;
        }
        inputText.addEventListener('input', updateStats);

        // =====================================================================
        // CLEAR
        // =====================================================================
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            updateStats();
            outputText.innerHTML = '<div class="ai-placeholder"><span class="ai-placeholder-icon">✨</span><p>Your processed text will appear here</p></div>';
            copyBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
        });

        // =====================================================================
        // PROCESS
        // =====================================================================
        processBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();
            if (!text) return;

            outputText.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div><p>Processing with AI...</p></div>';
            processBtn.disabled = true;
            processBtn.classList.add('ai-processing');
            copyBtn.style.display = 'none';
            downloadBtn.style.display = 'none';

            const payload = { text, mode: currentMode };
            if (currentMode === 'translate') payload.target_lang = document.getElementById('target-lang').value;
            if (currentMode === 'tone') payload.target_tone = document.getElementById('target-tone').value;

            try {
                const res = await fetch('/api/ai/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    outputText.innerHTML = '<div class="ai-result">' + escHtml(data.result) + '</div>';
                    copyBtn.style.display = 'inline-flex';
                    downloadBtn.style.display = 'inline-flex';
                    // Save to history
                    addToHistory(currentMode, text, data.result);
                } else {
                    outputText.innerHTML = '<div class="ai-error">❌ ' + (data.message || 'Something went wrong') + '</div>';
                }
            } catch (err) {
                outputText.innerHTML = '<div class="ai-error">❌ Failed to connect to the server</div>';
            }
            processBtn.disabled = false;
            processBtn.classList.remove('ai-processing');
        });

        // =====================================================================
        // COPY & DOWNLOAD
        // =====================================================================
        copyBtn.addEventListener('click', () => {
            const result = outputText.querySelector('.ai-result');
            if (result) {
                navigator.clipboard.writeText(result.textContent);
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000);
            }
        });

        downloadBtn.addEventListener('click', () => {
            const result = outputText.querySelector('.ai-result');
            if (result) {
                const blob = new Blob([result.textContent], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'textforge-output.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            }
        });

        // =====================================================================
        // HISTORY
        // =====================================================================
        function addToHistory(mode, input, output) {
            const entry = {
                mode,
                input: input.slice(0, 80) + (input.length > 80 ? '...' : ''),
                output: output.slice(0, 120) + (output.length > 120 ? '...' : ''),
                time: new Date().toLocaleString()
            };
            processingHistory.unshift(entry);
            if (processingHistory.length > 20) processingHistory.pop();
            localStorage.setItem('tf-history', JSON.stringify(processingHistory));
            renderHistory();
        }

        function renderHistory() {
            if (processingHistory.length === 0) {
                historyList.innerHTML = '<div class="ai-history-empty">No processing history yet</div>';
                return;
            }
            var modeIcons = {summarize:'📝', translate:'🌍', tone:'🎭', explain:'💡'};
            historyList.innerHTML = processingHistory.map(function(h, i) {
                return '<div class="ai-history-item">' +
                    '<div class="ai-history-top">' +
                        '<span class="ai-history-mode">' + (modeIcons[h.mode] || '⚡') + ' ' + h.mode + '</span>' +
                        '<span class="ai-history-time">' + h.time + '</span>' +
                    '</div>' +
                    '<p class="ai-history-input">' + escHtml(h.input) + '</p>' +
                    '<p class="ai-history-output">' + escHtml(h.output) + '</p>' +
                '</div>';
            }).join('');
        }

        document.getElementById('clear-history-btn').addEventListener('click', () => {
            processingHistory = [];
            localStorage.removeItem('tf-history');
            renderHistory();
        });

        // =====================================================================
        // EXAMPLES
        // =====================================================================
        document.querySelectorAll('.ai-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                inputText.value = chip.dataset.text;
                updateStats();
            });
        });

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Init
        renderHistory();
    </script>
</body>
</html>
