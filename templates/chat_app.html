<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BuzzChat — Real-time chat with rooms, emojis, and avatars">
    <title>BuzzChat — Rooms</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <script>
        (function () {
            const theme = localStorage.getItem('hub-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body class="ch-app-body">
    <header class="bz-topbar">
        <span class="bz-stamp" style="background:var(--bz-pink);color:var(--bz-ink);">BUZZCHAT</span>
        <div class="bz-top-links">
            <a href="{{ url_for('chat_page') }}">Lobby</a>
            <a href="{{ url_for('chat_settings_page') }}">Settings</a>
            <button type="button" class="bz-theme-toggle" id="theme-toggle" title="Toggle Theme">
                <span class="theme-icon-dark">🌙</span>
                <span class="theme-icon-light">☀️</span>
            </button>
            <a href="{{ url_for('portfolio_home') }}">Portfolio</a>
        </div>
    </header>
    <div class="ch-app">
        <aside class="ch-sidebar" id="sidebar">
            <div class="ch-sidebar-header">
                <a href="{{ url_for('chat_page') }}" class="ch-back" title="Lobby">←</a>
                <div class="ch-brand">
                    <span>💬</span>
                    <span class="ch-brand-text">BuzzChat</span>
                </div>
            </div>

            <div class="ch-user-section">
                <label class="ch-label">Your name</label>
                <div class="ch-user-input">
                    <input type="text" id="username" placeholder="Enter your name..." maxlength="20">
                </div>
            </div>

            <div class="ch-rooms-label">Rooms</div>
            <div class="ch-rooms" id="room-list">
                <button type="button" class="ch-room is-active" data-room="general">
                    <span class="ch-room-icon">🌐</span>
                    <span class="ch-room-name">General</span>
                    <span class="ch-room-badge" data-badge="general" style="display:none">0</span>
                </button>
                <button type="button" class="ch-room" data-room="random">
                    <span class="ch-room-icon">🎲</span>
                    <span class="ch-room-name">Random</span>
                    <span class="ch-room-badge" data-badge="random" style="display:none">0</span>
                </button>
                <button type="button" class="ch-room" data-room="tech">
                    <span class="ch-room-icon">💻</span>
                    <span class="ch-room-name">Tech Talk</span>
                    <span class="ch-room-badge" data-badge="tech" style="display:none">0</span>
                </button>
                <button type="button" class="ch-room" data-room="chill">
                    <span class="ch-room-icon">☕</span>
                    <span class="ch-room-name">Chill Zone</span>
                    <span class="ch-room-badge" data-badge="chill" style="display:none">0</span>
                </button>
            </div>

            <div class="ch-sidebar-footer">
                <div class="ch-online">
                    <span class="ch-online-dot"></span>
                    <span id="online-count">0</span> online
                </div>
            </div>
        </aside>

        <main class="ch-main">
            <header class="ch-chat-header">
                <button type="button" class="ch-menu-btn" id="menu-toggle">☰</button>
                <div>
                    <h2 id="room-title">🌐 General</h2>
                    <p class="ch-room-status" id="typing-status">Real-time chat</p>
                </div>
            </header>

            <div class="ch-messages" id="messages">
                <div class="ch-welcome">
                    <div class="ch-welcome-icon">💬</div>
                    <h3>Welcome to BuzzChat!</h3>
                    <p>Enter your name and start chatting in real-time.</p>
                </div>
            </div>

            <div class="ch-input-bar">
                <div class="ch-input-wrap">
                    <button type="button" class="ch-emoji-toggle" id="emoji-toggle" title="Emoji">😊</button>
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
                    <button type="button" class="ch-send-btn" id="send-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
                <div class="ch-emoji-picker" id="emoji-picker" style="display:none">
                    <div class="ch-emoji-grid" id="emoji-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentRoom = 'general';
        let username = '';
        let typingTimeout = null;
        let unreadCounts = { general: 0, random: 0, tech: 0, chill: 0 };

        const msgContainer = document.getElementById('messages');
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const usernameInput = document.getElementById('username');
        const roomBtns = document.querySelectorAll('.ch-room');
        const roomTitle = document.getElementById('room-title');
        const onlineCount = document.getElementById('online-count');
        const typingStatus = document.getElementById('typing-status');

        const avatarColors = ['#ffeb3b', '#ff90e8', '#7bfafb', '#fff', '#c4f000', '#ffa94d', '#b197fc', '#69db7c'];
        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }
        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }

        const emojis = ['😀', '😂', '😍', '🤔', '👍', '🎉', '🔥', '❤️', '😎', '🙌', '💯', '😊', '🤣', '😢', '😡', '👀', '✨', '🚀', '💪', '🙏', '😴', '🤝', '🎊', '🌈', '⚡', '🌟', '💬', '✅', '❌', '⏰'];
        const emojiGrid = document.getElementById('emoji-grid');
        emojis.forEach(e => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'ch-emoji-btn';
            btn.textContent = e;
            btn.addEventListener('click', () => {
                msgInput.value += e;
                msgInput.focus();
                document.getElementById('emoji-picker').style.display = 'none';
            });
            emojiGrid.appendChild(btn);
        });
        document.getElementById('emoji-toggle').addEventListener('click', () => {
            const picker = document.getElementById('emoji-picker');
            picker.style.display = picker.style.display === 'none' ? 'grid' : 'none';
        });

        usernameInput.addEventListener('input', () => {
            username = usernameInput.value.trim();
            const hasName = username.length > 0;
            msgInput.disabled = !hasName;
            sendBtn.disabled = !hasName;
            if (hasName) socket.emit('set_username', { username });
        });

        roomBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newRoom = btn.dataset.room;
                if (newRoom === currentRoom) {
                    document.getElementById('sidebar').classList.remove('is-open');
                    return;
                }
                socket.emit('leave_room', { room: currentRoom });
                currentRoom = newRoom;
                socket.emit('join_room', { room: currentRoom });
                roomBtns.forEach(b => b.classList.remove('is-active'));
                btn.classList.add('is-active');
                roomTitle.textContent = btn.querySelector('.ch-room-icon').textContent + ' ' + btn.querySelector('.ch-room-name').textContent;
                typingStatus.textContent = 'Real-time chat';
                unreadCounts[currentRoom] = 0;
                updateBadges();
                msgContainer.innerHTML = '';
                document.getElementById('sidebar').classList.remove('is-open');
            });
        });

        function updateBadges() {
            Object.keys(unreadCounts).forEach(room => {
                const badge = document.querySelector('[data-badge="' + room + '"]');
                if (badge) {
                    if (unreadCounts[room] > 0 && room !== currentRoom) {
                        badge.textContent = unreadCounts[room] > 99 ? '99+' : unreadCounts[room];
                        badge.style.display = 'flex';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            });
        }

        msgInput.addEventListener('input', () => {
            if (!username) return;
            socket.emit('typing', { room: currentRoom });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', { room: currentRoom });
            }, 2000);
        });

        socket.on('user_typing', data => {
            typingStatus.innerHTML = '<span class="ch-typing-anim">' + escHtml(data.username) + ' is typing<span class="ch-dots">...</span></span>';
        });
        socket.on('user_stop_typing', () => {
            typingStatus.textContent = 'Real-time chat';
        });

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !username) return;
            socket.emit('send_message', { room: currentRoom, message: text, username });
            socket.emit('stop_typing', { room: currentRoom });
            msgInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

        function renderMessage(data, isHistory) {
            const isMe = data.username === username;
            const div = document.createElement('div');
            div.className = 'ch-msg ' + (isMe ? 'ch-msg-mine' : 'ch-msg-other');
            if (!isHistory) div.classList.add('ch-msg-new');

            const color = getAvatarColor(data.username);
            const initials = getInitials(data.username);

            div.innerHTML =
                (!isMe ? '<div class="ch-msg-row"><div class="ch-avatar" style="background:' + color + '">' + initials + '</div><div class="ch-msg-content">' +
                    '<div class="ch-msg-name">' + escHtml(data.username) + '</div>' +
                    '<div class="ch-msg-bubble">' + escHtml(data.message) + '</div>' +
                    '<div class="ch-msg-time">' + (data.time || '') + '</div>' +
                    '</div></div>' :
                    '<div class="ch-msg-content">' +
                        '<div class="ch-msg-bubble">' + escHtml(data.message) + '</div>' +
                        '<div class="ch-msg-time">' + (data.time || '') + '</div>' +
                        '</div>');
            return div;
        }

        socket.on('message_history', data => {
            msgContainer.innerHTML = '';
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(m => {
                    msgContainer.appendChild(renderMessage(m, true));
                });
            }
            msgContainer.scrollTop = msgContainer.scrollHeight;
        });

        socket.on('new_message', data => {
            msgContainer.appendChild(renderMessage(data, false));
            msgContainer.scrollTop = msgContainer.scrollHeight;
            typingStatus.textContent = 'Real-time chat';
            if (data._room && data._room !== currentRoom) {
                unreadCounts[data._room] = (unreadCounts[data._room] || 0) + 1;
                updateBadges();
            }
        });

        socket.on('system_message', data => {
            const div = document.createElement('div');
            div.className = 'ch-system-msg';
            div.textContent = data.message;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        });

        socket.on('online_count', data => {
            onlineCount.textContent = data.count;
        });

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        socket.emit('join_room', { room: currentRoom });

        document.getElementById('menu-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('is-open');
        });

        // Theme toggle logic
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        themeToggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('hub-theme', next);
        });
    </script>
</body>

</html>
