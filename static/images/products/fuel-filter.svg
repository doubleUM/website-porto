<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Filter body (cylindrical) -->
  <rect x="135" y="80" width="130" height="230" rx="15" fill="#3a3a4a" stroke="#555" stroke-width="2"/>
  <!-- Input fitting (top) -->
  <rect x="175" y="50" width="50" height="35" rx="5" fill="url(#metal)" stroke="#999" stroke-width="1.5"/>
  <rect x="183" y="40" width="34" height="15" rx="4" fill="#999"/>
  <!-- Output fitting (bottom) -->
  <rect x="175" y="305" width="50" height="35" rx="5" fill="url(#metal)" stroke="#999" stroke-width="1.5"/>
  <rect x="183" y="335" width="34" height="15" rx="4" fill="#999"/>
  <!-- Bracket -->
  <rect x="265" y="160" width="60" height="70" rx="5" fill="#555" stroke="#777" stroke-width="1.5"/>
  <circle cx="295" cy="180" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <circle cx="295" cy="210" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- Label band -->
  <rect x="135" y="165" width="130" height="60" rx="0" fill="#2ecc71" opacity="0.85"/>
  <text x="200" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" letter-spacing="1">HIGH PRESSURE</text>
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">FUEL FILTER</text>
  <!-- Flow arrow -->
  <g fill="#f1c40f" opacity="0.5">
    <polygon points="200,75 192,62 196,62 196,50 204,50 204,62 208,62"/>
  </g>
  <g fill="#f1c40f" opacity="0.5">
    <polygon points="200,315 192,328 196,328 196,340 204,340 204,328 208,328"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="200" cy="370" rx="80" ry="10" fill="black" opacity="0.25"/>
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">IN-LINE MOUNT | 10 MICRON</text>
</svg>
