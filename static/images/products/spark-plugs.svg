<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="ceramic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5dc"/>
      <stop offset="100%" stop-color="#d4c89a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Spark plug 1 -->
  <g transform="translate(100, 50)">
    <rect x="15" y="0" width="20" height="25" rx="3" fill="#555"/>
    <rect x="10" y="25" width="30" height="15" rx="2" fill="url(#metal)"/>
    <polygon points="10,40 40,40 35,55 15,55" fill="#888"/>
    <rect x="15" y="55" width="20" height="80" rx="2" fill="url(#ceramic)"/>
    <polygon points="12,135 38,135 35,145 15,145" fill="url(#metal)"/>
    <rect x="17" y="145" width="16" height="50" rx="2" fill="url(#metal)"/>
    <line x1="25" y1="195" x2="25" y2="210" stroke="#ddd" stroke-width="3"/>
    <line x1="25" y1="210" x2="18" y2="225" stroke="#ddd" stroke-width="2.5"/>
    <!-- Spark -->
    <circle cx="21" cy="225" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="21" cy="225" r="8" fill="#00d4ff" opacity="0.2"/>
  </g>
  <!-- Spark plug 2 -->
  <g transform="translate(175, 70)">
    <rect x="15" y="0" width="20" height="25" rx="3" fill="#555"/>
    <rect x="10" y="25" width="30" height="15" rx="2" fill="url(#metal)"/>
    <polygon points="10,40 40,40 35,55 15,55" fill="#888"/>
    <rect x="15" y="55" width="20" height="80" rx="2" fill="url(#ceramic)"/>
    <polygon points="12,135 38,135 35,145 15,145" fill="url(#metal)"/>
    <rect x="17" y="145" width="16" height="50" rx="2" fill="url(#metal)"/>
    <line x1="25" y1="195" x2="25" y2="210" stroke="#ddd" stroke-width="3"/>
    <line x1="25" y1="210" x2="18" y2="225" stroke="#ddd" stroke-width="2.5"/>
    <circle cx="21" cy="225" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="21" cy="225" r="8" fill="#00d4ff" opacity="0.2"/>
  </g>
  <!-- Spark plug 3 -->
  <g transform="translate(245, 55)">
    <rect x="15" y="0" width="20" height="25" rx="3" fill="#555"/>
    <rect x="10" y="25" width="30" height="15" rx="2" fill="url(#metal)"/>
    <polygon points="10,40 40,40 35,55 15,55" fill="#888"/>
    <rect x="15" y="55" width="20" height="80" rx="2" fill="url(#ceramic)"/>
    <polygon points="12,135 38,135 35,145 15,145" fill="url(#metal)"/>
    <rect x="17" y="145" width="16" height="50" rx="2" fill="url(#metal)"/>
    <line x1="25" y1="195" x2="25" y2="210" stroke="#ddd" stroke-width="3"/>
    <line x1="25" y1="210" x2="18" y2="225" stroke="#ddd" stroke-width="2.5"/>
    <circle cx="21" cy="225" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="21" cy="225" r="8" fill="#00d4ff" opacity="0.2"/>
  </g>
  <!-- Label -->
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" letter-spacing="1">IRIDIUM SPARK PLUGS</text>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">SET OF 4</text>
</svg>
