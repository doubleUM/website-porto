<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="coilColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="50%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Coil Spring 1 -->
  <g transform="translate(70, 25)">
    <!-- Top plate -->
    <ellipse cx="65" cy="20" rx="40" ry="8" fill="#555" stroke="#777" stroke-width="1.5"/>
    <!-- Coils -->
    <ellipse cx="65" cy="50" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="85" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="120" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="155" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="190" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="225" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="260" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="290" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <!-- Bottom plate -->
    <ellipse cx="65" cy="315" rx="40" ry="8" fill="#555" stroke="#777" stroke-width="1.5"/>
  </g>
  <!-- Coil Spring 2 -->
  <g transform="translate(210, 25)">
    <ellipse cx="65" cy="20" rx="40" ry="8" fill="#555" stroke="#777" stroke-width="1.5"/>
    <ellipse cx="65" cy="50" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="85" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="120" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="155" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="190" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="225" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="260" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="290" rx="38" ry="12" fill="none" stroke="url(#coilColor)" stroke-width="10" stroke-linecap="round"/>
    <ellipse cx="65" cy="315" rx="40" ry="8" fill="#555" stroke="#777" stroke-width="1.5"/>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db" letter-spacing="1">HEAVY-DUTY COIL SPRINGS</text>
  <text x="200" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">FRONT PAIR | +2" LIFT</text>
</svg>
