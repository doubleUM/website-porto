<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shockBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="50%" stop-color="#444"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#999"/>
      <stop offset="50%" stop-color="#eee"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Shock absorber 1 -->
  <g transform="translate(90, 30)">
    <!-- Top mount -->
    <circle cx="50" cy="15" r="12" fill="#555" stroke="#777" stroke-width="2"/>
    <circle cx="50" cy="15" r="5" fill="#333"/>
    <!-- Shaft (chrome) -->
    <rect x="44" y="25" width="12" height="110" fill="url(#chrome)" rx="2"/>
    <!-- Dust boot -->
    <path d="M38,130 Q50,125 62,130 L60,155 Q50,150 40,155Z" fill="#333" stroke="#444" stroke-width="1"/>
    <!-- Body tube -->
    <rect x="35" y="150" width="30" height="160" rx="5" fill="url(#shockBody)" stroke="#555" stroke-width="1.5"/>
    <!-- Bottom mount -->
    <circle cx="50" cy="325" r="12" fill="#555" stroke="#777" stroke-width="2"/>
    <circle cx="50" cy="325" r="5" fill="#333"/>
    <!-- Gas charged label -->
    <rect x="38" y="200" width="24" height="60" rx="3" fill="#e74c3c" opacity="0.8"/>
    <text x="50" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" transform="rotate(-90 50 235)">GAS</text>
  </g>
  <!-- Shock absorber 2 -->
  <g transform="translate(230, 30)">
    <circle cx="50" cy="15" r="12" fill="#555" stroke="#777" stroke-width="2"/>
    <circle cx="50" cy="15" r="5" fill="#333"/>
    <rect x="44" y="25" width="12" height="110" fill="url(#chrome)" rx="2"/>
    <path d="M38,130 Q50,125 62,130 L60,155 Q50,150 40,155Z" fill="#333" stroke="#444" stroke-width="1"/>
    <rect x="35" y="150" width="30" height="160" rx="5" fill="url(#shockBody)" stroke="#555" stroke-width="1.5"/>
    <circle cx="50" cy="325" r="12" fill="#555" stroke="#777" stroke-width="2"/>
    <circle cx="50" cy="325" r="5" fill="#333"/>
    <rect x="38" y="200" width="24" height="60" rx="3" fill="#e74c3c" opacity="0.8"/>
    <text x="50" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" transform="rotate(-90 50 235)">GAS</text>
  </g>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f39c12" letter-spacing="1">SHOCK ABSORBER SET</text>
  <text x="200" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">REAR PAIR</text>
</svg>
