<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bulbMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Glow effect -->
  <circle cx="200" cy="160" r="120" fill="url(#glow)"/>
  <!-- LED Bulb 1 -->
  <g transform="translate(100, 60)">
    <!-- LED chip housing -->
    <rect x="25" y="0" width="50" height="80" rx="5" fill="#444" stroke="#666" stroke-width="1.5"/>
    <!-- LED chips -->
    <rect x="32" y="8" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="32" y="28" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="32" y="48" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <!-- LED glow -->
    <rect x="32" y="8" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="32" y="28" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="32" y="48" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <!-- Heat sink -->
    <rect x="20" y="80" width="60" height="60" rx="3" fill="url(#bulbMetal)"/>
    <line x1="28" y1="85" x2="28" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="38" y1="85" x2="38" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="48" y1="85" x2="48" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="58" y1="85" x2="58" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="68" y1="85" x2="68" y2="135" stroke="#999" stroke-width="1"/>
    <!-- Base connector -->
    <rect x="30" y="140" width="40" height="30" rx="3" fill="#555" stroke="#666" stroke-width="1"/>
    <line x1="35" y1="148" x2="65" y2="148" stroke="#777" stroke-width="1"/>
    <line x1="35" y1="155" x2="65" y2="155" stroke="#777" stroke-width="1"/>
    <line x1="35" y1="162" x2="65" y2="162" stroke="#777" stroke-width="1"/>
    <!-- Pins -->
    <rect x="38" y="170" width="6" height="15" rx="1" fill="#bbb"/>
    <rect x="56" y="170" width="6" height="15" rx="1" fill="#bbb"/>
  </g>
  <!-- LED Bulb 2 -->
  <g transform="translate(200, 60)">
    <rect x="25" y="0" width="50" height="80" rx="5" fill="#444" stroke="#666" stroke-width="1.5"/>
    <rect x="32" y="8" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="32" y="28" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="32" y="48" width="36" height="12" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="32" y="8" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="32" y="28" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="32" y="48" width="36" height="12" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="20" y="80" width="60" height="60" rx="3" fill="url(#bulbMetal)"/>
    <line x1="28" y1="85" x2="28" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="38" y1="85" x2="38" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="48" y1="85" x2="48" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="58" y1="85" x2="58" y2="135" stroke="#999" stroke-width="1"/>
    <line x1="68" y1="85" x2="68" y2="135" stroke="#999" stroke-width="1"/>
    <rect x="30" y="140" width="40" height="30" rx="3" fill="#555" stroke="#666" stroke-width="1"/>
    <line x1="35" y1="148" x2="65" y2="148" stroke="#777" stroke-width="1"/>
    <line x1="35" y1="155" x2="65" y2="155" stroke="#777" stroke-width="1"/>
    <line x1="35" y1="162" x2="65" y2="162" stroke="#777" stroke-width="1"/>
    <rect x="38" y="170" width="6" height="15" rx="1" fill="#bbb"/>
    <rect x="56" y="170" width="6" height="15" rx="1" fill="#bbb"/>
  </g>
  <!-- Specs -->
  <rect x="100" y="305" width="200" height="45" rx="8" fill="#222" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00d4ff">6000K PURE WHITE</text>
  <text x="200" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">12,000 LUMENS</text>
  <text x="200" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" letter-spacing="1">LED HEADLIGHT BULBS</text>
</svg>
