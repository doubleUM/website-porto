<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Filter frame -->
  <rect x="60" y="80" width="280" height="220" rx="10" fill="url(#frame)" stroke="#666" stroke-width="2"/>
  <!-- Inner filter media -->
  <rect x="75" y="95" width="250" height="190" rx="5" fill="#f5f5f5"/>
  <!-- Pleats pattern -->
  <g stroke="#ddd" stroke-width="1.5">
    <line x1="90" y1="95" x2="90" y2="285"/>
    <line x1="105" y1="95" x2="105" y2="285"/>
    <line x1="120" y1="95" x2="120" y2="285"/>
    <line x1="135" y1="95" x2="135" y2="285"/>
    <line x1="150" y1="95" x2="150" y2="285"/>
    <line x1="165" y1="95" x2="165" y2="285"/>
    <line x1="180" y1="95" x2="180" y2="285"/>
    <line x1="195" y1="95" x2="195" y2="285"/>
    <line x1="210" y1="95" x2="210" y2="285"/>
    <line x1="225" y1="95" x2="225" y2="285"/>
    <line x1="240" y1="95" x2="240" y2="285"/>
    <line x1="255" y1="95" x2="255" y2="285"/>
    <line x1="270" y1="95" x2="270" y2="285"/>
    <line x1="285" y1="95" x2="285" y2="285"/>
    <line x1="300" y1="95" x2="300" y2="285"/>
    <line x1="310" y1="95" x2="310" y2="285"/>
  </g>
  <!-- Activated carbon indicator -->
  <g opacity="0.15">
    <circle cx="100" cy="130" r="3" fill="#333"/>
    <circle cx="150" cy="160" r="4" fill="#333"/>
    <circle cx="200" cy="140" r="3" fill="#333"/>
    <circle cx="250" cy="180" r="4" fill="#333"/>
    <circle cx="120" cy="220" r="3" fill="#333"/>
    <circle cx="180" cy="250" r="4" fill="#333"/>
    <circle cx="280" cy="200" r="3" fill="#333"/>
    <circle cx="230" cy="240" r="3" fill="#333"/>
    <circle cx="300" cy="150" r="3" fill="#333"/>
  </g>
  <!-- HEPA badge -->
  <rect x="140" y="165" width="120" height="50" rx="25" fill="#2c3e50" opacity="0.9" stroke="#3498db" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3498db" letter-spacing="1">ACTIVATED</text>
  <text x="200" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">CARBON HEPA</text>
  <!-- Air purity icons -->
  <g fill="#2ecc71" opacity="0.5">
    <circle cx="130" cy="335" r="6"/>
    <circle cx="155" cy="335" r="6"/>
    <circle cx="180" cy="335" r="6"/>
    <circle cx="205" cy="335" r="6"/>
    <circle cx="230" cy="335" r="6"/>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2ecc71" letter-spacing="1">CABIN AIR FILTER</text>
  <text x="200" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">ODOR ELIMINATION</text>
</svg>
