<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="body" x1="150" y1="100" x2="250" y2="320">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Filter canister body -->
  <rect x="140" y="90" width="120" height="220" rx="60" fill="url(#body)" stroke="#555" stroke-width="2"/>
  <!-- Top thread -->
  <rect x="175" y="70" width="50" height="30" rx="5" fill="#666" stroke="#777" stroke-width="1.5"/>
  <rect x="180" y="60" width="40" height="15" rx="3" fill="#888"/>
  <!-- Gasket ring -->
  <ellipse cx="200" cy="90" rx="55" ry="8" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Brand stripe -->
  <rect x="140" y="160" width="120" height="60" fill="url(#accent)" opacity="0.9"/>
  <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" letter-spacing="2">PREMIUM</text>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">OIL FILTER</text>
  <!-- Bottom ridge details -->
  <line x1="155" y1="240" x2="245" y2="240" stroke="#555" stroke-width="1"/>
  <line x1="155" y1="250" x2="245" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="155" y1="260" x2="245" y2="260" stroke="#555" stroke-width="1"/>
  <!-- Bottom dome -->
  <ellipse cx="200" cy="310" rx="60" ry="10" fill="#333"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="340" rx="80" ry="12" fill="black" opacity="0.3"/>
</svg>
