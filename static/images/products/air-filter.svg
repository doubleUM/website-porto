<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="filter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Filter frame -->
  <rect x="70" y="100" width="260" height="180" rx="12" fill="#3a3a4a" stroke="#555" stroke-width="2"/>
  <!-- Inner filter media (pleated) -->
  <rect x="85" y="115" width="230" height="150" rx="6" fill="url(#filter)" opacity="0.9"/>
  <!-- Pleats -->
  <g stroke="#a02020" stroke-width="1.5" opacity="0.6">
    <line x1="100" y1="115" x2="100" y2="265"/>
    <line x1="115" y1="115" x2="115" y2="265"/>
    <line x1="130" y1="115" x2="130" y2="265"/>
    <line x1="145" y1="115" x2="145" y2="265"/>
    <line x1="160" y1="115" x2="160" y2="265"/>
    <line x1="175" y1="115" x2="175" y2="265"/>
    <line x1="190" y1="115" x2="190" y2="265"/>
    <line x1="205" y1="115" x2="205" y2="265"/>
    <line x1="220" y1="115" x2="220" y2="265"/>
    <line x1="235" y1="115" x2="235" y2="265"/>
    <line x1="250" y1="115" x2="250" y2="265"/>
    <line x1="265" y1="115" x2="265" y2="265"/>
    <line x1="280" y1="115" x2="280" y2="265"/>
    <line x1="295" y1="115" x2="295" y2="265"/>
    <line x1="310" y1="115" x2="310" y2="265"/>
  </g>
  <!-- K&N style badge -->
  <rect x="155" y="170" width="90" height="40" rx="5" fill="#222" stroke="#e74c3c" stroke-width="2"/>
  <text x="200" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#e74c3c">HIGH FLOW</text>
  <text x="200" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">AIR FILTER</text>
  <!-- Airflow arrows -->
  <g fill="#00d4ff" opacity="0.5">
    <polygon points="200,310 190,330 195,330 195,350 205,350 205,330 210,330"/>
    <polygon points="150,310 140,330 145,330 145,350 155,350 155,330 160,330"/>
    <polygon points="250,310 240,330 245,330 245,350 255,350 255,330 260,330"/>
  </g>
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" opacity="0.7">WASHABLE & REUSABLE</text>
</svg>
