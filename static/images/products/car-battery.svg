<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="battBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Battery body -->
  <rect x="80" y="130" width="240" height="180" rx="8" fill="url(#battBody)" stroke="#444" stroke-width="2"/>
  <!-- Top rim -->
  <rect x="75" y="125" width="250" height="15" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Terminal posts -->
  <!-- Positive -->
  <rect x="115" y="100" width="30" height="30" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="130" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">+</text>
  <!-- Negative -->
  <rect x="255" y="100" width="30" height="30" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="270" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">−</text>
  <!-- Label -->
  <rect x="100" y="160" width="200" height="100" rx="5" fill="#e74c3c" opacity="0.95"/>
  <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" letter-spacing="3">OPTIMA</text>
  <line x1="120" y1="200" x2="280" y2="200" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="200" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AGM BATTERY</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">12V</text>
  <!-- Specs -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa">750 CCA | 75 Ah</text>
  <!-- Bottom base -->
  <rect x="85" y="305" width="230" height="10" rx="3" fill="#222" stroke="#444" stroke-width="1"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="340" rx="120" ry="12" fill="black" opacity="0.3"/>
  <!-- Energy lightning bolt -->
  <g transform="translate(310, 280)" opacity="0.4">
    <polygon points="10,0 0,18 8,18 4,32 16,12 8,12 14,0" fill="#f1c40f"/>
  </g>
</svg>
