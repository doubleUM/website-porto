<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="alum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="40%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Housing body -->
  <ellipse cx="200" cy="200" rx="120" ry="120" fill="url(#alum)" stroke="#999" stroke-width="2"/>
  <!-- Cooling fins -->
  <g stroke="#777" stroke-width="1.5" opacity="0.7">
    <line x1="90" y1="160" x2="310" y2="160"/>
    <line x1="85" y1="175" x2="315" y2="175"/>
    <line x1="82" y1="190" x2="318" y2="190"/>
    <line x1="82" y1="205" x2="318" y2="205"/>
    <line x1="85" y1="220" x2="315" y2="220"/>
    <line x1="90" y1="235" x2="310" y2="235"/>
  </g>
  <!-- Inner core -->
  <circle cx="200" cy="200" r="50" fill="#555" stroke="#666" stroke-width="2"/>
  <!-- Center shaft hole -->
  <circle cx="200" cy="200" r="15" fill="#333" stroke="#444" stroke-width="2"/>
  <!-- Pulley groove -->
  <circle cx="200" cy="200" r="70" fill="none" stroke="#666" stroke-width="8" opacity="0.5"/>
  <!-- Mounting bolt holes -->
  <circle cx="200" cy="85" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <circle cx="200" cy="315" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- Connector -->
  <rect x="310" y="180" width="40" height="40" rx="5" fill="#444" stroke="#555" stroke-width="1.5"/>
  <circle cx="325" cy="195" r="4" fill="#f1c40f"/>
  <circle cx="340" cy="195" r="4" fill="#f1c40f"/>
  <circle cx="325" cy="210" r="4" fill="#f1c40f"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#00d4ff" letter-spacing="1">HIGH-OUTPUT ALTERNATOR</text>
  <text x="200" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">150 AMP</text>
</svg>
