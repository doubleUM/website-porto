<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6b1a"/>
      <stop offset="50%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#1a6b1a"/>
    </linearGradient>
    <linearGradient id="fluid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1c40f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e67e22" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <!-- Bottle body -->
  <rect x="130" y="120" width="140" height="220" rx="8" fill="url(#bottle)" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- Bottle neck -->
  <rect x="170" y="65" width="60" height="55" rx="4" fill="#1a8a1a" stroke="#2ecc71" stroke-width="1"/>
  <!-- Cap -->
  <rect x="165" y="45" width="70" height="25" rx="5" fill="#c0392b" stroke="#e74c3c" stroke-width="1"/>
  <rect x="175" y="40" width="50" height="10" rx="3" fill="#e74c3c"/>
  <!-- Label area -->
  <rect x="140" y="170" width="120" height="120" rx="5" fill="white" opacity="0.95"/>
  <!-- Label content -->
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b" letter-spacing="1">PREMIUM</text>
  <text x="200" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">BRAKE</text>
  <text x="200" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a2e">FLUID</text>
  <line x1="155" y1="248" x2="245" y2="248" stroke="#c0392b" stroke-width="2"/>
  <text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#c0392b">DOT 4</text>
  <text x="200" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">500ml</text>
  <!-- Fluid level indicator -->
  <rect x="275" y="200" width="15" height="100" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="277" y="240" width="11" height="58" rx="2" fill="url(#fluid)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="355" rx="80" ry="10" fill="black" opacity="0.3"/>
</svg>
